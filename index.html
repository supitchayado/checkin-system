<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; }
        body { font-family: 'Kanit', sans-serif; background: #f4f6f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 420px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #ccc !important; transform: none !important; }
        .btn-in { background: var(--primary); box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .btn-out { background: var(--danger); box-shadow: 0 4px 10px rgba(217,48,37,0.3); }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="page-in" class="hidden">
        <h2>🚚 บันทึก Check-in</h2>
        <label>1. เลือกช่องโหลดสินค้า</label>
        <select id="bayIn">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <label>2. Trip No.</label>
        <input type="number" id="tripNo" placeholder="ตัวเลข เช่น 55">
        <label>3. Time Slot</label>
        <input type="text" id="timeSlot" onblur="this.value=this.value.replace(/[.,\-\/]/g,':')" placeholder="12:15">
        <label>4. เลขทะเบียนรถ</label>
        <input type="text" id="plateNo" list="plateList" placeholder="พิมพ์เพื่อค้นหา...">
        <datalist id="plateList"></datalist>
        <button id="btnIn" class="btn-in" onclick="sendData('Check-in')">บันทึกและรันคิว</button>
    </div>

    <div id="page-out" class="hidden">
        <h2>🏁 บันทึก Check-out</h2>
        <label>ระบุช่องโหลดที่โหลดเสร็จ</label>
        <select id="bayOut">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <button id="btnOut" class="btn-out" onclick="sendData('Check-out')">ยืนยัน Check-out</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzORTn0AKf4r5dwd1qvkAMgkP1j7vqRJcShCK46jlfqJHFAdpjvr6m9Ks2JdO5UDedvYA/exec"; 

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        document.getElementById(page === 'out' ? 'page-out' : 'page-in').classList.remove('hidden');

        try {
            const res = await fetch(SCRIPT_URL);
            const plates = await res.json();
            const list = document.getElementById('plateList');
            plates.forEach(p => { let opt = document.createElement('option'); opt.value = p; list.appendChild(opt); });
        } catch(e) { console.log("Autocomplete loading..."); }
    };

    async function sendData(action) {
        const btn = action === 'Check-in' ? document.getElementById('btnIn') : document.getElementById('btnOut');
        const bayNo = action === 'Check-in' ? document.getElementById('bayIn').value : document.getElementById('bayOut').value;
        
        if (!bayNo) return alert("กรุณาเลือกช่องโหลด");

        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        const payload = {
            action: action,
            bayNo: bayNo,
            tripNo: document.getElementById('tripNo').value,
            timeSlot: document.getElementById('timeSlot').value,
            plateNo: document.getElementById('plateNo').value
        };

        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.text();
            alert(result);
            location.reload();
        } catch (e) {
            alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
            btn.disabled = false;
            btn.innerText = "ลองอีกครั้ง";
        }
    }
</script>
</body>
</html>
