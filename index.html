<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>ลงทะเบียนและ Check-in</h3>
        <label>เลือกช่องโหลดสินค้า (1-18)</label>
        <select id="bayNo" style="width:100%; padding:10px; border-radius:8px; margin-bottom:10px;">
            <option value="">-- เลือกช่องโหลด --</option>
            <script>
                for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);
            </script>
        </select>

        <label>Trip no. (กรอกเฉพาะตัวเลข)</label>
        <input type="number" id="tripNo" placeholder="เช่น 15">

        <label>Time slot (เช่น 05:15)</label>
        <input type="text" id="timeSlot" onblur="validateTime(this)" placeholder="05:15">

        <label>เลขทะเบียนรถ</label>
        <input type="text" id="plateNo" placeholder="กก 1234">

        <button class="btn-checkin" onclick="submitData('Check-in')">บันทึกและ Check-in ทันที</button>
    </div>
</div>
