<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; }
        label { display: block; margin-top: 10px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }
        button:disabled { background-color: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .btn-reg { background-color: #1a73e8; }
        .btn-checkin { background-color: #28a745; }
        .btn-loading { background-color: #f1c40f; color: #333; }
        .btn-checkout { background-color: #dc3545; }
        .info-box { background: #e8f0fe; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; border-left: 5px solid #1a73e8; }
        .reset-link { text-align: center; margin-top: 15px; font-size: 12px; color: #888; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>ลงทะเบียน Trip ใหม่</h3>
        <label>1) Trip no.</label>
        <input type="number" id="tripNo">
        <label>2) Time slot</label>
        <input type="text" id="timeSlot" onblur="formatTime(this)">
        <label>3) ชื่อขนส่ง</label>
        <input type="text" id="transportName">
        <button class="btn-reg" style="margin-top:15px;" onclick="registerTrip()">บันทึกข้อมูล</button>
    </div>
</div>

<div class="container">
    <div id="displayInfo" class="info-box" style="display:none;"></div>
    <div class="btn-group">
        <button id="btn1" class="btn-checkin" onclick="handleSubmit('Check-in')" disabled>1) Check-in</button>
        <button id="btn2" class="btn-loading" onclick="handleSubmit('Loading')" disabled>2) Loading</button>
        <button id="btn3" class="btn-checkout" onclick="handleSubmit('Check-out')" disabled>3) Check-out</button>
    </div>
    <div class="reset-link" onclick="resetApp()">เริ่ม Trip ใหม่ (ล้างข้อมูลเดิม)</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyyuP68M-Y4xE-wg0vSBTC48FIrL9J7U1Rq5daUNMhl7ocJRkBavaPRsv7ko-6X5Bn/exec';
    let currentData = {};

async function init() {
    await liff.init({ liffId: "2009407071-HDZ8c153" }); // ใส่ ID ของคุณ
    if (!liff.isLoggedIn()) {
        liff.login();
    } else {
        loadSavedData();
    }
}

function loadSavedData() {
    const saved = localStorage.getItem('trip_storage');
    const displayInfo = document.getElementById('displayInfo');
    const regModal = document.getElementById('regModal');

    if (saved) {
        // กรณีมีข้อมูลเก่า: แสดงแถบข้อมูลและเปิดปุ่มตามสถานะล่าสุด
        currentData = JSON.parse(saved);
        displayInfo.innerHTML = `<b>Trip:</b> ${currentData.tripNo} | <b>Time:</b> ${currentData.timeSlot}<br><b>ขนส่ง:</b> ${currentData.transportName}`;
        displayInfo.style.display = "block";
        regModal.style.display = "none"; // ปิดหน้ากรอก
        
        const status = localStorage.getItem('trip_status') || 'registered';
        updateButtons(status);
    } else {
        // กรณีไม่มีข้อมูล (หรือเพิ่งกด Reset): บังคับเปิดหน้ากรอกทันที
        displayInfo.style.display = "none";
        regModal.style.display = "block"; // เปิดหน้ากรอก
        updateButtons('none'); // ล็อคทุกปุ่มจนกว่าจะกรอกเสร็จ
    }
}

    function registerTrip() {
        const tripNo = document.getElementById('tripNo').value;
        const timeSlot = document.getElementById('timeSlot').value;
        const transportName = document.getElementById('transportName').value;

        if (!tripNo || !timeSlot || !transportName) return alert("กรุณากรอกข้อมูลให้ครบ");

        currentData = { tripNo, timeSlot, transportName };
        localStorage.setItem('trip_storage', JSON.stringify(currentData));
        localStorage.setItem('trip_status', 'registered');

        liff.sendMessages([{
            type: 'text',
            text: `📝 ลงทะเบียน Trip\nTrip No: ${tripNo}\nTime Slot: ${timeSlot}\nขนส่ง: ${transportName}`
        }]);

        document.getElementById('regModal').style.display = "none";
        loadSavedData();
    }

    async function handleSubmit(action) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const payload = { ...currentData, action, lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.text();

                if (result === "Success") {
                    alert("บันทึก " + action + " เรียบร้อยค่ะ");
                    
                    let nextStatus = '';
                    if (action === 'Check-in') nextStatus = 'checked_in';
                    else if (action === 'Loading') nextStatus = 'loading';
                    else if (action === 'Check-out') {
                        resetApp(); 
                        return;
                    }
                    
                    localStorage.setItem('trip_status', nextStatus);
                    updateButtons(nextStatus);
                } else {
                    alert("ขออภัย! ไม่อยู่ในพื้นที่ 500 เมตร");
                }
            } catch (e) { alert("เกิดข้อผิดพลาดในการส่งข้อมูล"); }
        });
    }

    function updateButtons(status) {
        document.getElementById('btn1').disabled = (status !== 'registered');
        document.getElementById('btn2').disabled = (status !== 'checked_in');
        document.getElementById('btn3').disabled = (status !== 'loading');
    }

    function resetApp() {
        if(confirm("ต้องการเริ่ม Trip ใหม่ใช่หรือไม่? (ข้อมูลเดิมจะหายไป)")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
