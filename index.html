<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
        h2 { color: #1a73e8; margin-top: 0; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; color: white; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-in { background: #1a73e8; }
        .btn-out { background: #d93025; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="page-in" class="hidden">
        <h2>🚚 บันทึก Check-in</h2>
        <label>1. เลือกช่องโหลด</label>
        <select id="bayIn">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <label>2. Trip No.</label>
        <input type="number" id="tripNo" placeholder="ตัวเลขเท่านั้น เช่น 15">
        <label>3. Time Slot</label>
        <input type="text" id="timeSlot" onblur="this.value=this.value.replace(/[.,\-\/]/g,':')" placeholder="เช่น 05:15">
        <label>4. เลขทะเบียนรถ</label>
        <input type="text" id="plateNo" placeholder="กก 1234">
        <button class="btn-in" onclick="send('Check-in')">บันทึกข้อมูลเข้า Sheet</button>
    </div>

    <div id="page-out" class="hidden">
        <h2>🏁 บันทึก Check-out</h2>
        <label>เลือกช่องโหลดที่ต้องการออก</label>
        <select id="bayOut">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <button class="btn-out" onclick="send('Check-out')">กด Check-out (รถออก)</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWp0Fy8PiYL0WQFawSzR4JSRuEA556EIJ3FlhkDyFRhD3olEw16N9JfE7WeBv5xbxAhg/exec";
    
    // ตรวจสอบพารามิเตอร์จากลิงก์ ?page=in หรือ ?page=out
    const urlParams = new URLSearchParams(window.location.search);
    const page = urlParams.get('page');
    if (page === 'out') document.getElementById('page-out').classList.remove('hidden');
    else document.getElementById('page-in').classList.remove('hidden');

    async function send(action) {
        const data = {
            action: action,
            bayNo: action === 'Check-in' ? document.getElementById('bayIn').value : document.getElementById('bayOut').value,
            tripNo: document.getElementById('tripNo').value,
            timeSlot: document.getElementById('timeSlot').value,
            plateNo: document.getElementById('plateNo').value
        };

        if (!data.bayNo) return alert("กรุณาเลือกช่องโหลด");

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.text();
            alert(result);
            location.reload(); 
        } catch (e) { alert("เกิดข้อผิดพลาด"); }
    }
</script>
</body>
</html>
