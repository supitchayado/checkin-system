<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; }
        body { font-family: 'Kanit', sans-serif; background: #f8f9fa; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; margin-top: 30px; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-in { background: var(--primary); }
        .btn-out { background: var(--danger); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="page-in" class="hidden">
        <h2>🚚 บันทึก Check-in</h2>
        <label>1. เลือกช่องโหลด</label>
        <select id="bayIn">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <label>2. Trip No.</label>
        <input type="number" id="tripNo" placeholder="ตัวเลข เช่น 15">
        <label>3. Time Slot</label>
        <input type="text" id="timeSlot" onblur="this.value=this.value.replace(/[.,\-\/]/g,':')" placeholder="05:15">
        <label>4. เลขทะเบียนรถ (ค้นหา/กรอกใหม่)</label>
        <input type="text" id="plateNo" list="plateList" placeholder="พิมพ์เลขทะเบียน...">
        <datalist id="plateList"></datalist>
        <button id="btnIn" class="btn-in" onclick="send('Check-in')">บันทึกข้อมูลเข้า Sheet</button>
    </div>

    <div id="page-out" class="hidden">
        <h2>🏁 บันทึก Check-out</h2>
        <label>เลือกช่องโหลดที่โหลดเสร็จ</label>
        <select id="bayOut">
            <option value="">-- เลือกช่อง 1-18 --</option>
            <script>for(let i=1; i<=18; i++) document.write(`<option value="${i}">ช่องที่ ${i}</option>`);</script>
        </select>
        <button id="btnOut" class="btn-out" onclick="send('Check-out')">ยืนยัน Check-out</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVZp61hS3AKHyXshst9Y9TGi3yH7Coxkd5P4cIRfrUw7RQ7rIVZhhh5KBdBbwK5cOXVg/exec"; 

    // โหลดข้อมูลทะเบียนรถทำ Autocomplete
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        document.getElementById(page === 'out' ? 'page-out' : 'page-in').classList.remove('hidden');

        try {
            const res = await fetch(SCRIPT_URL);
            const plates = await res.json();
            const list = document.getElementById('plateList');
            plates.forEach(p => { let opt = document.createElement('option'); opt.value = p; list.appendChild(opt); });
        } catch(e) { console.error("Database loading failed"); }
    };

    async function send(action) {
        const btn = action === 'Check-in' ? document.getElementById('btnIn') : document.getElementById('btnOut');
        const data = {
            action: action,
            bayNo: action === 'Check-in' ? document.getElementById('bayIn').value : document.getElementById('bayOut').value,
            tripNo: document.getElementById('tripNo').value,
            timeSlot: document.getElementById('timeSlot').value,
            plateNo: document.getElementById('plateNo').value
        };

        if (!data.bayNo) return alert("กรุณาเลือกช่องโหลด");
        
        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            const result = await response.text();
            alert(result);
            if (result.includes("Success")) location.reload();
            else { btn.disabled = false; btn.innerText = "ลองอีกครั้ง"; }
        } catch (e) {
            alert("เกิดข้อผิดพลาด");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
