<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Check-in System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-checkin { background-color: #28a745; }
        .btn-loading { background-color: #f1c40f; color: #333; }
        .btn-checkout { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบลงเวลาเข้าพื้นที่</h2>
    
    <label>1) Trip no.</label>
    <input type="number" id="tripNo" placeholder="กรอกตัวเลข Trip no.">

    <label>2) Time slot</label>
    <input type="text" id="timeSlot" placeholder="เช่น 08.30 หรือ 08-30" onblur="formatTime(this)">

    <label>3) ชื่อขนส่ง</label>
    <input type="text" id="transportName" placeholder="ชื่อบริษัทขนส่ง">

    <div class="btn-group">
        <button class="btn-checkin" onclick="handleSubmit('Check-in')">1) Check-in</button>
        <button class="btn-loading" onclick="handleSubmit('Loading')">2) Loading</button>
        <button class="btn-checkout" onclick="handleSubmit('Check-out')">3) Check-out</button>
    </div>
</div>

<script>
    // จุดที่แก้ไข: เปลี่ยนตัวอักษร . , - ให้เป็น :
    function formatTime(input) {
        input.value = input.value.replace(/[.,-]/g, ':');
    }

    async function handleSubmit(action) {
        const tripNo = document.getElementById('tripNo').value;
        const timeSlot = document.getElementById('timeSlot').value;
        const transportName = document.getElementById('transportName').value;

        if (!tripNo || !timeSlot || !transportName) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง");
            return;
        }

        // จุดที่แก้ไข: ข้อความแจ้งเตือนตามที่คุณต้องการ
        let successMsg = "";
        if (action === 'Check-in') successMsg = "ลงเวลาเข้าพื้นที่เรียบร้อยค่ะ";
        else if (action === 'Loading') successMsg = "ลงเวลาเข้าโหลดเรียบร้อยค่ะ";
        else if (action === 'Check-out') successMsg = "ลงเวลาออกจากพื้นที่คลังสินค้าแล้วค่ะ เดินทางปลอดภัยค่ะ";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const payload = {
                tripNo: tripNo,
                timeSlot: timeSlot,
                transportName: transportName,
                action: action,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };

            try {
                // *** สำคัญมาก: เปลี่ยน URL ด้านล่างนี้เป็น URL จาก Google Apps Script ของคุณ ***
                const scriptURL = 'https://script.google.com/macros/s/AKfycbxWZmEy63LZWaCYwwpX-XOupRCVq5w_kIrQasummcTyEH1GZLlj9RAi8ZS0dlwLioUk/exec'; 
                
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.text();
                
                if (result === "Success") {
                    alert(successMsg);
                } else {
                    // จุดที่แก้ไข: เปลี่ยนข้อความรัศมีเป็น 500 เมตร
                    alert("ขออภัย! คุณไม่ได้อยู่ในพื้นที่ที่กำหนด (รัศมี 500 เมตร) ไม่สามารถลงเวลาได้");
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบ");
            }
        }, (err) => {
            alert("กรุณาเปิดการเข้าถึงตำแหน่งพิกัด (GPS) บนมือถือของคุณด้วยค่ะ");
        }, { enableHighAccuracy: true }); // เพิ่มความแม่นยำสูงสุด
    }
</script>
</body>
</html>
