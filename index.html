<div id="tab-entry" class="card">
    <h2>🚧 จุดตรวจรถเข้า (รปภ.หน้า)</h2>
    
    <label>1. เลขทะเบียนรถ (พิมพ์ค้นหา)</label>
    <input type="text" id="plateNo" list="plateList" placeholder="เช่น กก 1234">
    <datalist id="plateList"></datalist>

    <label>2. เลข Trip No. (เฉพาะตัวเลข)</label>
    <input type="number" id="tripNoEntry" placeholder="เช่น 15">
    
    <button id="btnEntry" class="main-btn bg-blue" onclick="sendEntry()">บันทึก & ออกคิว</button>
    
    <div id="entryResult" class="result-box">
        <p>บันทึกสำเร็จ!</p>
        <h3 id="resQue">คิวที่: -</h3>
        <h3 id="resBay">ช่องโหลด: -</h3>
        <p style="font-size: 12px; color: #666;">*แจ้งเลขคิวและช่องให้คนขับไปที่ช่องโหลด*</p>
    </div>
</div>

<script>
    // แก้ไขฟังก์ชัน sendEntry() ในส่วน script ด้านล่าง
    async function sendEntry() {
        const plateNo = document.getElementById('plateNo').value;
        const tripNo = document.getElementById('tripNoEntry').value; // ดึงค่า Trip No.
        
        if(!plateNo || !tripNo) return alert("กรุณากรอกทะเบียนและเลข Trip");
        
        const btn = document.getElementById('btnEntry');
        btn.disabled = true;
        btn.innerText = "กำลังออกคิว...";

        try {
            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'Entry', 
                    plateNo: plateNo,
                    tripNo: tripNo // ส่งเลข Trip ไปให้สคริปต์จัดการเติม tour-
                }) 
            });
            const text = await res.text();
            
            const parts = text.split('|');
            document.getElementById('resQue').innerText = parts[0];
            document.getElementById('resBay').innerText = parts[1];
            document.getElementById('entryResult').style.display = 'block';
            
            // ล้างค่ารอคันถัดไป
            document.getElementById('plateNo').value = "";
            document.getElementById('tripNoEntry').value = "";
        } catch(e) { 
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); 
        }
        btn.disabled = false;
        btn.innerText = "บันทึก & ออกคิว";
    }
</script>
