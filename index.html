<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* Modal Style */
        .modal { display: block; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; }
        
        label { display: block; margin-top: 10px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; }
        button:disabled { background-color: #ccc !important; cursor: not-allowed; }
        
        .btn-reg { background-color: #1a73e8; }
        .btn-checkin { background-color: #28a745; }
        .btn-loading { background-color: #f1c40f; color: #333; }
        .btn-checkout { background-color: #dc3545; }
        .info-box { background: #e8f0fe; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>ลงทะเบียนข้อมูล Trip</h3>
        <label>1) Trip no.</label>
        <input type="number" id="tripNo" placeholder="ตัวเลขเท่านั้น">
        <label>2) Time slot</label>
        <input type="text" id="timeSlot" placeholder="เช่น 08.30 หรือ 08-30" onblur="formatTime(this)">
        <label>3) ชื่อขนส่ง</label>
        <input type="text" id="transportName">
        <button class="btn-reg" style="margin-top:15px;" onclick="registerTrip()">บันทึกข้อมูล</button>
    </div>
</div>

<div class="container">
    <div id="displayInfo" class="info-box"></div>
    <div class="btn-group">
        <button id="btn1" class="btn-checkin" onclick="handleSubmit('Check-in')" disabled>1) Check-in</button>
        <button id="btn2" class="btn-loading" onclick="handleSubmit('Loading')" disabled>2) Loading</button>
        <button id="btn3" class="btn-checkout" onclick="handleSubmit('Check-out')" disabled>3) Check-out</button>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    let currentData = {};
    let step = 1;

    // เริ่มต้น LIFF
    liff.init({ liffId: "ใส่_LIFF_ID_ของคุณ" });

    function formatTime(input) {
        input.value = input.value.replace(/[.,\-;/]/g, ':');
    }

    function registerTrip() {
        const tripNo = document.getElementById('tripNo').value;
        const timeSlot = document.getElementById('timeSlot').value;
        const transportName = document.getElementById('transportName').value;

        if (!tripNo || !timeSlot || !transportName) return alert("กรุณากรอกข้อมูลให้ครบ");

        currentData = { tripNo, timeSlot, transportName };
        
        // โชว์ข้อมูลที่กรอกในหน้าเว็บ
        document.getElementById('displayInfo').innerHTML = `<b>Trip:</b> ${tripNo} | <b>Time:</b> ${timeSlot}<br><b>ขนส่ง:</b> ${transportName}`;
        document.getElementById('displayInfo').style.display = "block";
        
        // ปิด Modal และเปิดปุ่มที่ 1
        document.getElementById('regModal').style.display = "none";
        document.getElementById('btn1').disabled = false;

        // ส่งข้อความเข้าแชท LINE
        liff.sendMessages([{
            type: 'text',
            text: `ลงทะเบียน Trip เรียบร้อยแล้ว\nTrip No: ${tripNo}\nTime Slot: ${timeSlot}\nขนส่ง: ${transportName}`
        }]);
    }

    async function handleSubmit(action) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const payload = { ...currentData, action, lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            const response = await fetch('https://script.google.com/macros/s/AKfycbwyyuP68M-Y4xE-wg0vSBTC48FIrL9J7U1Rq5daUNMhl7ocJRkBavaPRsv7ko-6X5Bn/exec', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.text();

            if (result === "Success") {
                alert("บันทึก " + action + " สำเร็จ");
                // จัดการลำดับปุ่ม
                if (action === 'Check-in') {
                    document.getElementById('btn1').disabled = true;
                    document.getElementById('btn2').disabled = false;
                } else if (action === 'Loading') {
                    document.getElementById('btn2').disabled = true;
                    document.getElementById('btn3').disabled = false;
                } else {
                    document.getElementById('btn3').disabled = true;
                    alert("ดำเนินการเสร็จสิ้นทุกขั้นตอนแล้วค่ะ");
                }
            } else {
                alert("คุณไม่ได้อยู่ในพื้นที่รัศมี 500 เมตร");
            }
        });
    }
</script>
</body>
</html>
